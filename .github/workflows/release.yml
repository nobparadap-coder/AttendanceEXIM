name: Build and Release AttendanceEXIM

on:
  push:
    tags:
      - 'v*'   # จะทำงานเมื่อคุณสร้าง tag เช่น v1.0.0

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build Electron app
        run: npm run build:desktop   # ใช้ script ที่คุณตั้งไว้ใน package.json

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.exe
            dist/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

