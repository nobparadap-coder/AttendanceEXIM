directories:
  output: dist
  buildResources: build
appId: com.attendanceexim.app
productName: AttendanceEXIM
files:
  - filter:
      - server.js
      - main.js
      - preload.js
      - index.html
      - report.html
      - admin.html
      - manifest.json
      - service-worker.js
      - icons/*
win:
  target: nsis
  icon: icons/icon-512.png
mac:
  target: dmg
  icon: icons/icon-512.png
linux:
  target: AppImage
  icon: icons/icon-512.png
electronVersion: 29.4.6
