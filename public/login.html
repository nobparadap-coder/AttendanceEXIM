<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Attendance EXIM System - Login</title>
  <!-- โหลด Font Awesome สำหรับไอคอน -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- โหลด style.css จากโฟลเดอร์ public -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-box">
    <h2><i class="fa-solid fa-user-lock"></i> เข้าสู่ระบบ</h2>
    <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้">
    <select id="role">
      <option value="">-- เลือกสิทธิ์การใช้งาน --</option>
      <option value="G4">G4</option>
      <option value="G5">G5</option>
    </select>
    <button onclick="login()"><i class="fa-solid fa-right-to-bracket"></i> เข้าสู่ระบบ</button>
  </div>

  <!-- Popup แจ้งผล -->
  <div id="popupBox" class="popup">
    <i id="popupIcon" class="fa-solid"></i>
    <span id="popupMessage"></span>
  </div>

  <script>
    function login() {
      const username = document.getElementById("username").value.trim();
      const role = document.getElementById("role").value;

      if (!username || !role) {
        showPopup("error", "กรุณากรอกชื่อผู้ใช้และเลือกสิทธิ์การใช้งาน");
        return;
      }

      // เก็บข้อมูลลง localStorage
      localStorage.setItem("user", username);
      localStorage.setItem("role", role);

      showPopup("success", "เข้าสู่ระบบสำเร็จ");

      setTimeout(() => {
        window.location.href = "index.html"; // ไปหน้า Index หลัง login สำเร็จ
      }, 1000);
    }

    function showPopup(type, message) {
      const popup = document.getElementById("popupBox");
      const icon = document.getElementById("popupIcon");
      const msg = document.getElementById("popupMessage");

      popup.className = `popup show ${type}`;
      msg.innerText = message;

      if (type === "success") icon.className = "fa-solid fa-check-circle";
      else if (type === "error") icon.className = "fa-solid fa-times-circle";
      else icon.className = "fa-solid fa-info-circle";

      setTimeout(() => popup.className = "popup", 2500);
    }
  </script>
</body>
</html>
